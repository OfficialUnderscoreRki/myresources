<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 10px; text-align: center; width: 300px; }
        .btn { display: block; width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; }
        .lua { background: #21262d; color: #8b949e; cursor: not-allowed; }
        .res { background: #238636; color: white; }
        #download-area { display: none; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 15px; }
        .dl-btn { background: #1f6feb; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <button class="btn lua">Lua Codes</button>
        <button class="btn res" onclick="toggleRes()">Resources</button>
        
        <div id="download-area">
            <p>Plik testowy:</p>
            <!-- ZMIEŃ 'plik.zip' NA SWOJĄ NAZWĘ PLIKU -->
            <a href="plik.zip" download class="btn dl-btn">POBIERZ</a>
        </div>
    </div>

    <script>
        function toggleRes() {
            var x = document.getElementById("download-area");
            x.style.display = (x.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
